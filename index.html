<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EcoTravel</title>

<style>

/* RESET */
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family: Arial, sans-serif;
}

body{
  background:#f5f5f5;
}

/* HEADER */
header{
  background:#004d40;
  padding:20px 8%;
  position:sticky;
  top:0;
  z-index:1000;
}

/* NAVBAR */
.navbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  flex-wrap:wrap;
}

.logo{
  color:white;
  font-size:32px;
  font-weight:bold;
}

/* NAV LINKS */
.nav-links{
  display:flex;
  gap:25px;
  list-style:none;
}

.nav-links a{
  color:white;
  text-decoration:none;
  font-size:18px;
  transition:0.3s;
}

.nav-links a:hover{
  color:#ffd54f;
}

/* HERO SECTION */
.hero{

  height:85vh;
  background:
  linear-gradient(rgba(0,0,0,0.45),
  rgba(0,0,0,0.45)),
  url('web bg.png') center/cover no-repeat;


  display:flex;
  justify-content:center;
  align-items:center;
  text-align:center;
  color:white;
  padding:20px;
}

.hero-content h2{
  font-size:60px;
  margin-bottom:20px;
}

.hero-content p{
  font-size:22px;
  margin-bottom:30px;
}

/* BUTTON */
.btn{
  display:inline-block;
  background:#00a152;
  color:white;
  padding:14px 30px;
  border-radius:8px;
  text-decoration:none;
  font-size:18px;
  transition:0.3s;
}

.btn:hover{
  background:#007e3c;
  transform:scale(1.05);
}

/* SECTION */
.section{
  padding:80px 8%;
  text-align:center;
}

.section h2{
  font-size:40px;
  margin-bottom:40px;
}

/* CARDS */
.cards{
  display:flex;
  justify-content:center;
  flex-wrap:wrap;
  gap:30px;
}

.card{
  background:white;
  width:280px;
  padding:30px 20px;
  border-radius:15px;
  box-shadow:0 4px 15px rgba(0,0,0,0.1);
  transition:0.3s;
}

.card:hover{
  transform:translateY(-10px);
}

.card h3{
  font-size:28px;
  margin-bottom:15px;
}

.card p{
  font-size:17px;
  color:#555;
}

/* ALT SECTION */
.alt-section{
  background:#e0f2f1;
}

/* FOOTER */
footer{
  background:#004d40;
  color:white;
  text-align:center;
  padding:20px;
  margin-top:50px;
}

/* MOBILE */
@media(max-width:900px){

  .nav-links{
    flex-wrap:wrap;
    justify-content:center;
  }

  .hero-content h2{
    font-size:40px;
  }

  .hero-content p{
    font-size:18px;
  }

}

/* MOBILE RESPONSIVE */
@media(max-width:768px){

header{
  padding:20px;
}

.navbar{
  flex-direction:column;
  gap:15px;
}

.logo{
  font-size:28px;
}

.nav-links{
  flex-wrap:wrap;
  justify-content:center;
  gap:15px;
}

.nav-links a{
  font-size:16px;
}
  
  .hero{
    height:85vh;
    padding:20px;
  }

  .hero-content h2{
    font-size:32px;
    line-height:1.2;
    margin-bottom:20px;
  }

  .hero-content p{
    font-size:18px;
    line-height:1.5;
    margin-bottom:25px;
  }

  .btn{
    padding:14px 28px;
    font-size:18px;
  }

  .cards{
    flex-direction:column;
    align-items:center;
  }

  .card{
    width:90%;
  }

}

</style>
</head>

<body>

<!-- HEADER -->
<header>

  <div class="navbar">

    <div class="logo">
      EcoTravel 🌍
    </div>

    <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="eco/destinations.html">Destinations</a></li>
        <li><a href="eco/shop.html">Shop</a></li>
        <li><a href="eco/awareness.html">Awareness</a></li>
        <li><a href="eco/about.html">About</a></li>
        <li><a href="eco/contact.html">Contact</a></li>
    </ul>

  </div>

</header>

<!-- HERO -->
<section class="hero" id="home">
  <div class="hero-content">

    <h2>Discover Places Worth Visiting</h2>

    <p>
      Farm Trips • Swimming • Nature Adventures • Eco Tourism
    </p>

    <a href="eco/destinations.html" class="btn">
      Explore Now
    </a>

  </div>

</section>

<!-- FOOTER -->
<footer>

  <p>
    © 2026 EcoTravel Adventures | Travel Responsibly 🌍
  </p>

</footer>

</body>
</html>
