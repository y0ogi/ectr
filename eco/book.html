<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Booking</title>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial;
}

body{
  background:
  linear-gradient(rgba(0,0,0,0.4),
  rgba(0,0,0,0.4)),
  url('../Pictures/p/web\ bg.png')
  center/cover no-repeat;

  height:100vh;

  display:flex;
  justify-content:center;
  align-items:center;
}

/* FORM BOX */
.booking-box{
  width:90%;
  max-width:450px;

  background:rgba(255,255,255,0.08);

  backdrop-filter:blur(5px);

  border:1px solid rgba(255,255,255,0.2);

  padding:35px;

  border-radius:20px;

  color:white;

  box-shadow:0 8px 30px rgba(0,0,0,0.2);
}

.booking-box h1{
  text-align:center;
  margin-bottom:25px;
}

.booking-box input{
  width:100%;
  padding:14px;
  margin-top:12px;
  border:none;
  border-radius:8px;
}

.booking-box button{
  width:100%;
  padding:14px;
  margin-top:20px;

  border:none;

  border-radius:8px;

  background:#00a152;

  color:white;

  font-size:18px;

  cursor:pointer;
}

.booking-box button:hover{
  background:#007e3c;
}

/* SUCCESS */
#success{
  display:none;
  text-align:center;
}

/* MOBILE RESPONSIVE */
@media(max-width:768px){

  .navbar{
    flex-direction:column;
    gap:15px;
  }

  .nav-links{
    flex-wrap:wrap;
    justify-content:center;
    gap:15px;
  }

  .nav-links a{
    font-size:16px;
  }

  .hero img{
    width:90%;
    height:220px;
  }

  .hero-content h1,
  .content h1{
    font-size:35px;
    text-align:center;
  }

  .hero-content p,
  .content p{
    font-size:16px;
    text-align:center;
  }

  .cards{
    flex-direction:column;
    align-items:center;
  }

  .card{
    width:90%;
  }

  .gallery{
    justify-content:center;
  }

  .gallery img{
    width:90%;
  }

  .content{
    padding:30px 20px;
  }

}

</style>
</head>

<body>

<div class="booking-box">

<div id="form-section">

<h1> Book Your Trip</h1>

<form id="bookingForm">

<input type="text"
placeholder="Full Name"
required>

<input type="email"
placeholder="Email"
required>

<input type="date"
required>

<input type="number"
placeholder="Number of People"
required>

<button type="submit">
Confirm Booking
</button>

</form>

</div>

<!-- SUCCESS MESSAGE -->
<div id="success">

<h1>✅ Booking Successful!</h1>

<p>
Your reservation has been submitted.
</p>

<br>

<a href="../index.html">

<button>
Back to Home
</button>

</a>

</div>

</div>

<script>

const form =
document.getElementById("bookingForm");

form.addEventListener("submit", function(e){

e.preventDefault();

document.getElementById("form-section")
.style.display = "none";

document.getElementById("success")
.style.display = "block";

});

</script>

</body>
</html>
