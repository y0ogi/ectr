<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Destinations</title>

<style>

/* RESET */
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial, sans-serif;
}

body{
  background:#f5f5f5;
}

/* HEADER */
header{
  background:#004d40;
  padding:20px 8%;
  position:sticky;
  top:0;
  z-index:1000;
}

/* NAVBAR */
.navbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  flex-wrap:wrap;
}

/* LOGO */
.logo{
  color:white;
  font-size:32px;
  font-weight:bold;
}

/* NAV LINKS */
.nav-links{
  display:flex;
  gap:25px;
  list-style:none;
}

.nav-links a{
  color:white;
  text-decoration:none;
  font-size:18px;
  transition:0.3s;
}

.nav-links a:hover{
  color:#ffd54f;
}

/* PAGE TITLE */
.page-title{
  color:#004d40;
  text-align:center;
  padding:60px 20px;
}

.page-title h1{
  font-size:55px;
  font-weight: bold;
}

/* CARDS */
.cards{
  display:flex;
  justify-content:center;
  gap:30px;
  flex-wrap:wrap;
  padding:60px 20px;
}

.card{
  background:white;
  width:280px;
  padding:30px 20px;
  border-radius:18px;
  box-shadow:0 4px 15px rgba(0,0,0,0.1);
  text-align:center;
  transition:0.3s;
}

.card:hover{
  transform:translateY(-10px);
}

.card h2{
  font-size:30px;
  margin-bottom:15px;
  color:#004d40;
}

.card p{
  font-size:17px;
  color:#555;
  line-height:1.6;
}

/* MOBILE */
@media(max-width:768px){

  header{
    padding:18px 20px;
  }

  .navbar{
    flex-direction:column;
    gap:15px;
  }

  .logo{
    font-size:28px;
    text-align:center;
  }

  .nav-links{
    flex-wrap:wrap;
    justify-content:center;
    gap:15px;
    padding:0;
  }

  .nav-links a{
    font-size:16px;
  }

  .page-title{
    padding:45px 20px;
  }

  .page-title h1{
    font-size:36px;
  }

  .cards{
    flex-direction:column;
    align-items:center;
    padding:40px 20px;
  }

  .card{
    width:95%;
  }

}

</style>
</head>

<body>

    <!-- HEADER -->
<header>

  <div class="navbar">

    <div class="logo">
      EcoTravel 🌍
    </div>

    <ul class="nav-links">
      <li><a href="../index.html">Home</a></li>
      <li><a href="destinations.html">Destinations</a></li>
      <li><a href="shop.html">Shop</a></li>
      <li><a href="awareness.html">Awareness</a></li>
      <li><a href="about.html">About</a></li>
      <li><a href="contact.html">Contact</a></li>
    </ul>

  </div>

</header>

<div class="page-title">
  <h1>Explore Destinations 🌴</h1>
</div>

<!--farm-->
<div class="cards">

<a href="farms.html" style="text-decoration:none; color:black;">
  <div class="card">
    <h2>🌾 Farms</h2>
    <p>Farm adventures and fresh air.</p>
  </div>
</a>

<!--resort-->
  <div class="card">

<a href="resorts.html" style="text-decoration:none; color:black;">
    <h2>🏊 Resorts</h2>
    <p>Relax and enjoy swimming resorts.</p>
  </div>
</a>

<!--nature-->
  <div class="card">

<a href="nature.html" style="text-decoration:none; color:black;">

  </div>
</a>
</div>

</body>
</html>
