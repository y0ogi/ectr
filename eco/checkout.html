<!DOCTYPE html>
<html>
<head>
<title>Checkout</title>

<style>

body{
  font-family:Arial;
  background:#f5f5f5;
  margin:0;
  padding:40px 20px;
}

.container{
  max-width:700px;
  margin:auto;
}

.box{
  background:white;
  padding:40px;
  border-radius:20px;
  box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

h1{
  text-align:center;
  color:#004d40;
  margin-bottom:30px;
}

form{
  display:flex;
  flex-direction:column;
  gap:20px;
}

label{
  font-weight:bold;
  color:#004d40;
}

input,
textarea,
select{
  padding:14px;
  border:1px solid #ccc;
  border-radius:10px;
  font-size:16px;
}

textarea{
  height:100px;
  resize:none;
}

button{
  background:#009688;
  color:white;
  border:none;
  padding:15px;
  border-radius:10px;
  font-size:18px;
  cursor:pointer;
}

button:hover{
  background:#00796b;
}

</style>
</head>

<body>

<div class="container">

<div class="box">

<h1>Checkout 🛒</h1>

<form action="success.html">

<label>Full Name</label>
<input type="text" required>

<label>Contact Number</label>
<input type="text" required>

<label>Address</label>
<textarea required></textarea>

<label>Quantity</label>
<input type="number" min="1" value="1">

<label>Payment Method</label>

<select>
<option>Cash on Delivery</option>
<option>GCash</option>
<option>Maya</option>
</select>

<button type="submit">
Place Order
</button>

</form>

</div>

</div>

</body>
</html>
